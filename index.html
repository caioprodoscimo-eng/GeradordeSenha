<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
   <main class="caixa">
        <h1>Gerador de Senhas</h1>
        <input type="text" id="senha" readonly placeholder="Senha gerada!">
        <label for="quantidade">Quantidade de Caracteres</label>
        <input type="number" id="quantidade" value="8" min="4">
        <label>
            Letras Minúsculas
            <input type="checkbox" id="minusculas" checked>
        </label>
        <label>
            Letras Maiúsculas
            <input type="checkbox" id="minusculas" checked>
        </label>
        <label>
            Números
            <input type="checkbox" id="numeros">
        </label> 
        <label>
            Caracteres especiais
            <input type="checkbox" id="especiais">
        </label> 
        <button onclick="gerarSenha()"> Gerar Senhas</button><br>
        <button onclick="limparSenha()"> Limpar Senhas</button>
        <script src="script.js"></script>            
        </main> 
</body>
</html>
